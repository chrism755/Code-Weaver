kind = "web"
previewPath = "/"
title = "Replit Clone"
version = "1.0.0"
id = "artifacts/replit-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21020

[services.development]
run = "pnpm --filter @workspace/replit-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/replit-clone", "run", "build" ]
publicDir = "artifacts/replit-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21020"
BASE_PATH = "/"
